name = "bixi-monitor"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

# Poll the GBFS feed every minute. (Cron Triggers minimum granularity.)
[triggers]
crons = ["* * * * *"]

# D1 (SQLite). For local dev wrangler uses a local copy and ignores database_id.
# Before `wrangler deploy`: run `wrangler d1 create bixi345` and paste the real
# database_id below (it also prints the exact block to copy).
[[d1_databases]]
binding = "DB"
database_name = "bixi345"
database_id = "59ccb2b5-2201-4933-8731-e391cba195c2"

# Serve the built dashboard (Vite output) as static assets. Requests that don't
# match a file fall through to the Worker's fetch handler (which owns /api/*).
[assets]
directory = "./dist"
binding = "ASSETS"
